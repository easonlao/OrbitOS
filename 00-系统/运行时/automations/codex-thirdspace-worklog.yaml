name: "ThirdSpace 每日工作日志初始化"
kind: "cron"
status: "ACTIVE"
schedule: "daily 08:00 Asia/Shanghai"
# cwd 和 vault 路径由 Agent 在运行时从 .orbit/workspace-index.yaml 解析
# 不硬编码绝对路径，部署时由 install-runtime 根据实际 vault 位置生成
cwd: "{VAULT}"
execution_environment: "local"
model: "gpt-5.2"
reasoning_effort: "low"
prompt: >-
  Run node {SKILLS}/orbit-vault/scripts/orbit-vault.mjs ensure-worklog --vault {VAULT}.
  {VAULT} = directory containing .orbit/workspace-index.yaml (walk up from cwd to find it).
