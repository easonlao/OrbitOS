{
  "$schema": "https://json-schema.org/draft/2020-12/schema",
  "$id": "orbitos/core-change.schema.yaml",
  "title": "OrbitOS Core Change",
  "description": "OrbitOS 内核修改记录。用于约束 .orbitos/、AGENTS、系统规则、schema、workflow、验证脚本等核心内容的编写和修改。",
  "type": "object",
  "additionalProperties": false,
  "required": [
    "id",
    "timestamp",
    "actor",
    "change_type",
    "scope",
    "summary",
    "reason",
    "affected_files",
    "validation",
    "user_visible_change",
    "promotion"
  ],
  "properties": {
    "id": {
      "type": "string",
      "description": "核心变更 ID。建议格式：core_change_YYYYMMDD_HHMMSS_topic。"
    },
    "timestamp": {
      "type": "string",
      "description": "变更记录时间。使用 ISO 8601。"
    },
    "actor": {
      "type": "object",
      "description": "执行或提出本次核心变更的主体。",
      "additionalProperties": false,
      "required": [
        "type",
        "name"
      ],
      "properties": {
        "type": {
          "type": "string",
          "enum": [
            "user",
            "agent",
            "system"
          ]
        },
        "name": {
          "type": "string"
        },
        "agent_id": {
          "type": [
            "string",
            "null"
          ]
        },
        "role": {
          "type": [
            "string",
            "null"
          ]
        },
        "device": {
          "type": [
            "string",
            "null"
          ]
        }
      }
    },
    "change_type": {
      "type": "string",
      "enum": [
        "schema",
        "workflow",
        "internal_doc",
        "agent_entry",
        "system_rule",
        "validation",
        "directory_protocol",
        "runtime_state",
        "mixed"
      ],
      "description": "核心变更类型。mixed 只在一次变更确实跨多个内核区域时使用。"
    },
    "scope": {
      "type": "object",
      "description": "本次变更影响的系统层级。",
      "additionalProperties": false,
      "required": [
        "layer",
        "paths"
      ],
      "properties": {
        "layer": {
          "type": "string",
          "enum": [
            "root_entry",
            "internal_runtime",
            "user_system_docs",
            "visible_views",
            "mixed"
          ],
          "description": "root_entry=AGENTS/README 等根入口；internal_runtime=.orbitos；user_system_docs=00-系统；visible_views=02-时间线等视图。"
        },
        "paths": {
          "type": "array",
          "description": "涉及路径。必须写相对路径。",
          "items": {
            "type": "string"
          }
        }
      }
    },
    "summary": {
      "type": "string",
      "description": "一句话说明本次核心变更。"
    },
    "reason": {
      "type": "string",
      "description": "为什么需要这次核心变更。必须说明触发来源或设计依据。"
    },
    "affected_files": {
      "type": "array",
      "description": "计划或实际影响的文件。",
      "items": {
        "type": "object",
        "additionalProperties": false,
        "required": [
          "path",
          "change_type",
          "purpose"
        ],
        "properties": {
          "path": {
            "type": "string"
          },
          "change_type": {
            "type": "string",
            "enum": [
              "created",
              "updated",
              "deleted",
              "moved",
              "renamed"
            ]
          },
          "purpose": {
            "type": "string",
            "description": "为什么改这个文件。"
          }
        }
      }
    },
    "validation": {
      "type": "object",
      "description": "本次核心变更如何验证。不能留空。",
      "additionalProperties": false,
      "required": [
        "required",
        "method",
        "status"
      ],
      "properties": {
        "required": {
          "type": "boolean",
          "description": "是否必须验证。核心变更默认应为 true。"
        },
        "method": {
          "type": "string",
          "enum": [
            "run_validation_eval",
            "manual_review",
            "schema_only",
            "not_applicable"
          ],
          "description": "验证方式。"
        },
        "command": {
          "type": [
            "string",
            "null"
          ],
          "description": "验证命令。无命令则填 null。"
        },
        "status": {
          "type": "string",
          "enum": [
            "pending",
            "passed",
            "failed",
            "skipped"
          ]
        },
        "note": {
          "type": [
            "string",
            "null"
          ]
        }
      }
    },
    "user_visible_change": {
      "type": "boolean",
      "description": "这次核心变更是否影响用户可见说明或 Dashboard。"
    },
    "promotion": {
      "type": "object",
      "description": "是否需要从 .orbitos/docs 提升到 00-系统。若 user_visible_change=true，必须说明如何展示给用户。",
      "additionalProperties": false,
      "required": [
        "needed",
        "target",
        "reason"
      ],
      "properties": {
        "needed": {
          "type": "boolean"
        },
        "target": {
          "type": [
            "string",
            "null"
          ],
          "description": "目标用户可见文件，例如 00-系统/PRINCIPLES.md。无需提升则填 null。"
        },
        "reason": {
          "type": "string",
          "description": "为什么需要或不需要提升。"
        }
      }
    },
    "related_event": {
      "type": [
        "string",
        "null"
      ],
      "description": "对应 event id。"
    }
  }
}
